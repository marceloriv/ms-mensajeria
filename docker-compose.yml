services:
  mysql:
    image: mysql:8.4
    container_name: ms-mensajeria-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-mensajeria_db}
      MYSQL_USER: ${DB_USER:-ticketti_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ticketti-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ms-mensajeria-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticketti-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-mensajeria-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8085}:8085"
    environment:
      # Datasource para Spring Boot
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-mensajeria_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      # Mail
      MAIL_USERNAME: ${MAIL_USERNAME:-notificaciones.ticketti@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD in .env}
      # Config Server (opcional)
      SPRING_CONFIG_IMPORT: optional:configserver:${CONFIG_SERVER_URL:-http://host.docker.internal:8888}
      # Eureka
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_URL:-http://host.docker.internal:8761/eureka/}
    networks:
      - ticketti-network

volumes:
  mysql-data:

networks:
  ticketti-network:
    driver: bridge